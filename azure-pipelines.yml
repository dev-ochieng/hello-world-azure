trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  pythonVersion: '3.11'
  vmImageName: 'ubuntu-latest'
  azureSubscription: 'Azure-Service-Connection'
  appName: 'hello-world-python-app-2026'
  resourceGroup: 'rg-hello-world'

stages:
# ───────────────────────────────────────────────
# STAGE 1: VALIDATE & BUILD (CI)
# ───────────────────────────────────────────────
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build & Package'
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Use Python $(pythonVersion)'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install dependencies'

    - script: |
        pip install flake8 pytest
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      displayName: 'Lint code'
      continueOnError: true

    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/app
        cp app.py requirements.txt startup.txt $(Build.ArtifactStagingDirectory)/app/
      displayName: 'Copy app files to artifact staging'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app'
        ArtifactName: 'drop'
        publishLocation: 'Container'
      displayName: 'Publish Artifact'

# ───────────────────────────────────────────────
# STAGE 2: INFRASTRUCTURE (TERRAFORM - CLI FIXED)
# ───────────────────────────────────────────────
- stage: Infrastructure
  displayName: 'Terraform Deploy'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: TerraformJob
    displayName: 'Provision Azure Infrastructure'
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self

    # ✅ Install Terraform manually
    - script: |
        sudo apt-get update
        sudo apt-get install -y unzip
        curl -fsSL https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip -o terraform.zip
        unzip terraform.zip
        sudo mv terraform /usr/local/bin/
      displayName: 'Install Terraform'

    # ✅ Verify Terraform
    - script: terraform version
      displayName: 'Terraform Version'

    # ✅ Login to Azure
    - task: AzureCLI@2
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Logged into Azure successfully"
      displayName: 'Azure Login'

    # ✅ Terraform Init (backend config corrected)
    - script: |
        cd terraform
        terraform init \
          -backend-config="resource_group_name=tfstate-rg" \
          -backend-config="storage_account_name=mystorageaccountelvis" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=hello-world.terraform.tfstate"
      displayName: 'Terraform Init'

    # ✅ Terraform Plan
    - script: |
        cd terraform
        terraform plan
      displayName: 'Terraform Plan'

    # ✅ Terraform Apply
    - script: |
        cd terraform
        terraform apply -auto-approve
      displayName: 'Terraform Apply'
# ───────────────────────────────────────────────
# STAGE 3: DEPLOY APPLICATION (CD)
# ───────────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Infrastructure
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy to App Service'
    pool:
      vmImage: $(vmImageName)
    environment: 'hello-world-production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: 'drop'
            displayName: 'Download Build Artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appName)'
              package: '$(Pipeline.Workspace)/drop'
              runtimeStack: 'PYTHON|3.11'
              startupCommand: 'gunicorn --bind=0.0.0.0 --timeout 600 app:app'
            displayName: 'Deploy to Azure App Service'
